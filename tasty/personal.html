<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dimension Loop | BobaScroll</title>
    <style>
        body {
            margin: 0;
            background: #000;
            color: #0ff;
            font-family: 'Courier New', monospace;
            height: 10000px; 
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid #f0f;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 100;
            box-shadow: 0 0 10px #f0f;
        }

        .helix-container {
            position: relative;
            width: 200px;
            margin-top: 100px;
        }

        .node {
            position: absolute;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #0ff;
            box-shadow: 0 0 20px #0ff;
            transform: translateX(var(--x));
        }

        /* Glitch effect for loop transition */
        .glitch {
            animation: glitch 0.2s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(2px, 0); }
            50% { transform: translate(-2px, -2px); filter: hue-rotate(90deg); }
            100% { transform: translate(0, 2px); }
        }
    </style>
</head>
<body>

    <div id="ui">
        Loop: <span id="loops">0</span><br>
        Stability: <span id="stable">100%</span><br>
        <span id="msg" style="color: #f0f;">DESCENDING...</span>
    </div>

    <div class="helix-container" id="helix"></div>

    <script>
    const container = document.getElementById('helix');
    const loopsEl = document.getElementById('loops');
    const stableEl = document.getElementById('stable');
    const msgEl = document.getElementById('msg');
    
    let loopCount = 0;
    let stability = 100;

    // Generate Helix nodes
    for (let i = 0; i < 400; i++) {
        const angle = i * 0.2;
        const x = Math.sin(angle) * 100;
        const node = document.createElement('div');
        node.className = 'node';
        node.style.top = `${i * 25}px`;
        node.style.setProperty('--x', `${x}px`);
        container.appendChild(node);
    }

    // High-precision scroll monitor
    window.onscroll = () => {
        const scrolled = window.pageYOffset || document.documentElement.scrollTop;
        const windowHeight = window.innerHeight;
        const bodyHeight = document.documentElement.scrollHeight;
        
        // TRIGGER ZONE: If we are within 10px of the bottom
        if (scrolled + windowHeight >= bodyHeight - 10) {
            
            // 🌀 THE INSTANT TELEPORT
            // We use scrollTo(0, 0) but immediately move it to 5px to prevent bounce
            window.scrollTo({
                top: 5,
                behavior: 'instant' // Force no-animation snap
            });

            // Dimension Logic
            loopCount++;
            stability -= 2;
            loopsEl.innerText = loopCount;
            stableEl.innerText = Math.max(0, stability) + "%";

            // Visual Feedback
            document.body.classList.add('glitch');
            setTimeout(() => document.body.classList.remove('glitch'), 200);

            if (loopCount % 2 !== 0) {
                document.body.style.transform = "rotate(180deg)";
                msgEl.innerText = "REALITY INVERTED";
            } else {
                document.body.style.transform = "rotate(0deg)";
                msgEl.innerText = "RECURSION ACTIVE";
            }
        }

        // Color shift
        const hue = (scrolled / 20) % 360;
        document.body.style.filter = `hue-rotate(${hue}deg)`;
    };
</script>
</body>
</html>
